apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: vault-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-unseal
  namespace: vault-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-unseal
  namespace: vault-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-unseal
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault-system
---
apiVersion: vault.banzaicloud.com/v1alpha1
kind: Vault
metadata:
  name: vault
  namespace: vault-system
spec:
  size: 1
  image: hashicorp/vault:2.0.2
  bankVaultsImage: ghcr.io/bank-vaults/bank-vaults:v1.33.1

  # Schedule on any node
  serviceAccount: vault

  # Use local file storage on PVC
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi

  # Unseal configuration using Kubernetes Secrets (solo-dev safe)
  unsealConfig:
    kubernetes:
      secretNamespace: vault-system

  config:
    storage:
      file:
        path: "/vault/file"
    listener:
      tcp:
        address: "0.0.0.0:8200"
        tls_disable: true
    ui: true

  # Bank-Vaults externalConfig: auto-configure Vault on startup
  externalConfig:
    # Enable KV v2 secrets engine
    secrets:
      - type: kv
        path: secret
        description: "KV v2 secrets engine for application secrets"
        options:
          version: 2

    # Enable PKI secrets engine for Vault CA (used by Istio)
    # This creates a root CA that Istio can use
      - type: pki
        path: pki
        description: "PKI secrets engine for internal CA"
        configuration:
          root/generate:
            - name: internal
              common_name: "Orb Internal CA"
              ttl: "87600h"
          roles:
            - name: istio-ca
              allowed_domains: "istio-system.svc.cluster.local,svc.cluster.local,cluster.local,istio-system.svc"
              allow_subdomains: true
              allow_any_name: true
              allowed_uri_sans: "spiffe://*"
              max_ttl: "72h"
              require_cn: false
              use_csr_common_name: true

    # Enable Kubernetes auth method
    auth:
      - type: kubernetes
        path: kubernetes
        roles:
          - name: cert-manager
            bound_service_account_names: ["vault-issuer"]
            bound_service_account_namespaces: ["cert-manager"]
            policies: ["cert-manager"]
            ttl: 1h
          - name: authentik
            bound_service_account_names: ["authentik", "authentik-server", "authentik-worker", "default"]
            bound_service_account_namespaces: ["authentik"]
            policies: ["authentik"]
            ttl: 1h
          - name: grafana
            bound_service_account_names: ["grafana", "default"]
            bound_service_account_namespaces: ["monitoring"]
            policies: ["grafana"]
            ttl: 1h
          - name: gitea
            bound_service_account_names: ["gitea", "default"]
            bound_service_account_namespaces: ["gitea"]
            policies: ["gitea"]
            ttl: 1h
          - name: openfga
            bound_service_account_names: ["openfga", "default"]
            bound_service_account_namespaces: ["openfga"]
            policies: ["openfga"]
            ttl: 1h
          - name: minio
            bound_service_account_names: ["minio", "default"]
            bound_service_account_namespaces: ["minio"]
            policies: ["minio"]
            ttl: 1h
          - name: vso
            bound_service_account_names: ["vault-secrets-operator-controller-manager", "default"]
            bound_service_account_namespaces: ["vault-system", "database", "authentik", "monitoring", "minio", "gitea", "openfga"]
            policies: ["vso"]
            ttl: 1h

    # Vault policies
    policies:
      - name: cert-manager
        rules: |
          path "pki/sign/istio-ca" {
            capabilities = ["create", "update"]
          }
      - name: authentik
        rules: |
          path "secret/data/authentik/*" {
            capabilities = ["read", "list"]
          }
          path "secret/data/postgres/*" {
            capabilities = ["read"]
          }
      - name: grafana
        rules: |
          path "secret/data/grafana/*" {
            capabilities = ["read", "list"]
          }
          path "secret/data/postgres/*" {
            capabilities = ["read"]
          }
      - name: gitea
        rules: |
          path "secret/data/gitea/*" {
            capabilities = ["read", "list"]
          }
          path "secret/data/postgres/*" {
            capabilities = ["read"]
          }
          path "secret/data/minio/*" {
            capabilities = ["read"]
          }
      - name: openfga
        rules: |
          path "secret/data/openfga/*" {
            capabilities = ["read", "list"]
          }
          path "secret/data/postgres/*" {
            capabilities = ["read"]
          }
      - name: minio
        rules: |
          path "secret/data/minio/*" {
            capabilities = ["read", "list"]
          }
      - name: vso
        rules: |
          path "secret/data/*" {
            capabilities = ["read", "list"]
          }

