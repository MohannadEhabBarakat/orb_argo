# VaultAuth configures how the Vault Secrets Operator authenticates to Vault
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: vault-system
spec:
  vaultConnectionRef: default
  method: kubernetes
  mount: kubernetes
  allowedNamespaces:
    - database
    - authentik
    - monitoring
    - seaweedfs
    - gitea
    - openfga
  kubernetes:
    role: vso
    serviceAccount: default
---
# Postgres secrets → database namespace
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: postgres-vault-secrets
  namespace: database
spec:
  vaultAuthRef: vault-system/vault-auth
  type: kv-v2
  mount: secret
  path: postgres/config
  destination:
    name: postgres-vault-secrets
    create: true
  refreshAfter: 1m
---
