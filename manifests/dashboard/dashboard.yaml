apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.5-alpine
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        - name: tmp
          mountPath: /tmp
        - name: run
          mountPath: /var/run
        - name: cache
          mountPath: /var/cache/nginx
        - name: conf-volume
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: tmp
        emptyDir: {}
      - name: run
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: html-volume
        configMap:
          name: dashboard-html
      - name: conf-volume
        configMap:
          name: dashboard-conf
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: tools
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: dashboard
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: dashboard
  namespace: tools
spec:
  hosts:
  - "dashboard.localhost"
  gateways:
  - istio-ingress/orb-gateway
  http:
  - route:
    - destination:
        host: dashboard.tools.svc.cluster.local
        port:
          number: 80
