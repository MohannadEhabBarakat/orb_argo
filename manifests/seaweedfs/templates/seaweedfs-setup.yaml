apiVersion: batch/v1
kind: Job
metadata:
  name: seaweedfs-setup
  namespace: seaweedfs
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      restartPolicy: OnFailure
      containers:
      - name: seaweedfs-setup
        image: amazon/aws-cli:2.15.0
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 256Mi
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for SeaweedFS S3..."
          export AWS_ACCESS_KEY_ID="${SEAWEEDFS_S3_ACCESS_KEY}"
          export AWS_SECRET_ACCESS_KEY="${SEAWEEDFS_S3_SECRET_KEY}"
          
          # Wait until s3 endpoint responds
          while ! aws --endpoint-url http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333 s3 ls; do
            echo "Waiting..."
            sleep 5
          done
          echo "SeaweedFS is up. Creating buckets..."
          aws --endpoint-url http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333 s3 mb s3://chunks || true
          aws --endpoint-url http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333 s3 mb s3://ruler || true
          aws --endpoint-url http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333 s3 mb s3://admin || true
          aws --endpoint-url http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333 s3 mb s3://gitea || true
          echo "Buckets created successfully."
        env:
        - name: SEAWEEDFS_S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-vault-secrets
              key: SEAWEEDFS_S3_ACCESS_KEY
              optional: true
        - name: SEAWEEDFS_S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-vault-secrets
              key: SEAWEEDFS_S3_SECRET_KEY
              optional: true
