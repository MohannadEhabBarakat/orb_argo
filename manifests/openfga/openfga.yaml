apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  namespace: openfga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openfga
  template:
    metadata:
      labels:
        app: openfga
    spec:
      initContainers:
      - name: openfga-migrate
        image: openfga/openfga:latest
        command: ["/openfga", "migrate"]
        env:
        - name: OPENFGA_DATASTORE_ENGINE
          value: "postgres"
        - name: OPENFGA_DATASTORE_URI
          valueFrom:
            secretKeyRef:
              name: openfga-vault-secrets
              key: OPENFGA_DATASTORE_URI
      containers:
      - name: openfga
        image: openfga/openfga:latest
        command: ["/openfga", "run"]
        env:
        - name: OPENFGA_DATASTORE_ENGINE
          value: "postgres"
        - name: OPENFGA_DATASTORE_URI
          valueFrom:
            secretKeyRef:
              name: openfga-vault-secrets
              key: OPENFGA_DATASTORE_URI
        # Authentik OIDC
        - name: OPENFGA_AUTHN_METHOD
          value: "oidc"
        - name: OPENFGA_AUTHN_OIDC_ISSUER
          value: "https://auth.localhost/application/o/openfga/"
        - name: OPENFGA_AUTHN_OIDC_AUDIENCE
          value: "openfga"
        ports:
        - containerPort: 8080
        - containerPort: 8081
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: openfga
  namespace: openfga
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 8081
    targetPort: 8081
  - name: playground
    port: 3000
    targetPort: 3000
  selector:
    app: openfga
