apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  namespace: openfga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openfga
  template:
    metadata:
      labels:
        app: openfga
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: openfga-migrate
        image: openfga/openfga:v1.17.1
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 256Mi
        command: ["/openfga", "migrate"]
        env:
        - name: OPENFGA_DATASTORE_ENGINE
          value: "postgres"
        - name: OPENFGA_DATASTORE_URI
          valueFrom:
            secretKeyRef:
              name: openfga-vault-secrets
              key: OPENFGA_DATASTORE_URI
      containers:
      - name: openfga
        image: openfga/openfga:v1.17.1
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
        command: ["/openfga", "run"]
        args: ["--playground-addr", "0.0.0.0:3000"]
        env:
        - name: SSL_CERT_FILE
          value: "/etc/ssl/custom-certs/root-ca.pem"
        - name: OPENFGA_PLAYGROUND_ENABLED
          value: "true"
        - name: OPENFGA_PLAYGROUND_PORT
          value: "3000"
        - name: OPENFGA_PLAYGROUND_ADDR
          value: "0.0.0.0:3000"
        - name: OPENFGA_DATASTORE_ENGINE
          value: "postgres"
        - name: OPENFGA_DATASTORE_URI
          valueFrom:
            secretKeyRef:
              name: openfga-vault-secrets
              key: OPENFGA_DATASTORE_URI
        ports:
        - containerPort: 8080
        - containerPort: 8081
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: vault-ca
          mountPath: /etc/ssl/custom-certs
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      - name: vault-ca
        configMap:
          name: vault-ca
---
apiVersion: v1
kind: Service
metadata:
  name: openfga
  namespace: openfga
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 8081
    targetPort: 8081
  - name: playground
    port: 3000
    targetPort: 3000
  selector:
    app: openfga
