apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  initial-setup.yaml: |
    # Authentik Blueprint for OIDC infrastructure
    # Note on deletions:
    # Deleting a resource from a Blueprint file sometimes leaves the resource 
    # orphaned in Authentik rather than deleting it. You have to explicitly change 
    # the attribute to `state: absent` to clean it up properly.
    version: 1
    metadata:
      name: Core OIDC Infrastructure
    entries:
      # ── Admin Group ──
      - model: authentik_core.group
        state: present
        identifiers:
          name: authentik-admins
        attrs:
          is_superuser: true

      # ══════════════════════════════════════
      # MinIO OIDC Provider + Application
      # ══════════════════════════════════════
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: minio-oidc
        id: minio-provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_type: confidential
          client_id: minio
          client_secret: !Env MINIO_CLIENT_SECRET
          redirect_uris: |
            https://minio.localhost/oauth_callback
            http://minio.localhost/oauth_callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/generated]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: minio
        attrs:
          name: MinIO
          provider: !KeyOf minio-provider
          meta_launch_url: https://minio.localhost

      # ══════════════════════════════════════
      # Grafana OIDC Provider + Application
      # ══════════════════════════════════════
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: grafana-oidc
        id: grafana-provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_type: confidential
          client_id: grafana
          client_secret: !Env GRAFANA_CLIENT_SECRET
          redirect_uris: |
            https://grafana.localhost/login/generic_oauth
            http://grafana.localhost/login/generic_oauth
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/generated]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          provider: !KeyOf grafana-provider
          meta_launch_url: https://grafana.localhost

      # ══════════════════════════════════════
      # Gitea OIDC Provider + Application
      # ══════════════════════════════════════
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: gitea-oidc
        id: gitea-provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_type: confidential
          client_id: gitea
          client_secret: !Env GITEA_CLIENT_SECRET
          redirect_uris: |
            https://gitea.localhost/user/oauth2/authentik/callback
            http://gitea.localhost/user/oauth2/authentik/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/generated]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: gitea
        attrs:
          name: Gitea
          provider: !KeyOf gitea-provider
          meta_launch_url: https://gitea.localhost

      # ══════════════════════════════════════
      # OpenFGA OIDC Provider + Application
      # ══════════════════════════════════════
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: openfga-oidc
        id: openfga-provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_type: confidential
          client_id: openfga
          client_secret: !Env OPENFGA_CLIENT_SECRET
          redirect_uris: |
            https://openfga.localhost/callback
            http://openfga.localhost/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/generated]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: openfga
        attrs:
          name: OpenFGA
          provider: !KeyOf openfga-provider
          meta_launch_url: https://openfga.localhost
