apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  initial-setup.yaml: |
    # Authentik Blueprint for OIDC infrastructure
    # Note on deletions:
    # Deleting a resource from a Blueprint file sometimes leaves the resource 
    # orphaned in Authentik rather than deleting it. You have to explicitly change 
    # the attribute to `state: absent` to clean it up properly.
    version: 1
    metadata:
      name: Core OIDC Infrastructure
    entries:
      # ── Admin Group ──
      - model: authentik_core.group
        state: present
        identifiers:
          name: authentik-admins
        attrs:
          is_superuser: true



      # ══════════════════════════════════════
      # Grafana OIDC Provider + Application
      # ══════════════════════════════════════
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: grafana-oidc
        id: grafana-provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: grafana
          client_secret: !Env GRAFANA_CLIENT_SECRET
          grant_types:
            - authorization_code
            - implicit
            - refresh_token
          redirect_uris:
            - url: https://grafana.{{ .Values.baseDomain }}/login/generic_oauth
              matching_mode: strict
            - url: http://grafana.{{ .Values.baseDomain }}/login/generic_oauth
              matching_mode: strict
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/generated]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          provider: !KeyOf grafana-provider
          meta_launch_url: https://grafana.{{ .Values.baseDomain }}

      # ══════════════════════════════════════
      # Gitea OIDC Provider + Application
      # ══════════════════════════════════════
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: gitea-oidc
        id: gitea-provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: gitea
          client_secret: !Env GITEA_CLIENT_SECRET
          grant_types:
            - authorization_code
            - implicit
            - refresh_token
          redirect_uris:
            - url: https://gitea.{{ .Values.baseDomain }}/user/oauth2/authentik/callback
              matching_mode: strict
            - url: http://gitea.{{ .Values.baseDomain }}/user/oauth2/authentik/callback
              matching_mode: strict
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/generated]]

      - model: authentik_core.application
        state: present
        identifiers:
          slug: gitea
        attrs:
          name: Gitea
          provider: !KeyOf gitea-provider
          meta_launch_url: https://gitea.{{ .Values.baseDomain }}

      # ══════════════════════════════════════
      # Kiali OIDC Provider + Application
      # ══════════════════════════════════════
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: kiali-oidc
        id: kiali-provider
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: kiali
          client_secret: !Env KIALI_CLIENT_SECRET
          grant_types:
            - authorization_code
            - implicit
            - refresh_token
          redirect_uris:
            - url: https://kiali.{{ .Values.baseDomain }}/kiali/api/auth/openid_redirect
              matching_mode: strict
            - url: https://kiali.{{ .Values.baseDomain }}/kiali
              matching_mode: strict
            - url: http://kiali.{{ .Values.baseDomain }}/kiali
              matching_mode: strict
            - url: https://kiali.{{ .Values.baseDomain }}
              matching_mode: strict
            - url: http://kiali.{{ .Values.baseDomain }}
              matching_mode: strict
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [managed, goauthentik.io/crypto/generated]]
          jwt_alg: RS256

      - model: authentik_core.application
        state: present
        identifiers:
          slug: kiali
        attrs:
          name: Kiali
          provider: !KeyOf kiali-provider
          meta_launch_url: https://kiali.{{ .Values.baseDomain }}

      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          protocol_providers: []


