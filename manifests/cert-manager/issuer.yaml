apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-issuer
  namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-issuer-token-creator
  namespace: cert-manager
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    resourceNames: ["vault-issuer"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-issuer-token-creator-binding
  namespace: cert-manager
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
roleRef:
  kind: Role
  name: vault-issuer-token-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
spec:
  vault:
    path: pki/sign/istio-ca
    server: http://vault.vault-system.svc.cluster.local:8200
    auth:
      kubernetes:
        mountPath: /v1/auth/kubernetes
        role: cert-manager
        serviceAccountRef:
          name: vault-issuer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-issuer-patcher
  namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-issuer-patcher-role
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-issuer-patcher-binding
subjects:
  - kind: ServiceAccount
    name: vault-issuer-patcher
    namespace: cert-manager
roleRef:
  kind: ClusterRole
  name: vault-issuer-patcher-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: patch-vault-issuer-ca
  namespace: cert-manager
spec:
  template:
    spec:
      serviceAccountName: vault-issuer-patcher
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: patcher
          image: alpine/k8s:1.30.0
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for Vault to be ready..."
              # Wait until Vault API responds
              until curl -s http://vault.vault-system.svc.cluster.local:8200/v1/pki/ca/pem > /dev/null; do
                sleep 5
              done
              CA=$(curl -s http://vault.vault-system.svc.cluster.local:8200/v1/pki/ca/pem | base64 | tr -d '\n')
              if [ -z "$CA" ]; then
                echo "Failed to fetch CA"
                exit 1
              fi
              echo "Waiting for vault-issuer ClusterIssuer to exist..."
              until kubectl get clusterissuer vault-issuer >/dev/null 2>&1; do
                sleep 2
              done
              echo "Patching vault-issuer ClusterIssuer with CA Bundle..."
              kubectl patch clusterissuer vault-issuer --type='json' -p="[{\"op\": \"add\", \"path\": \"/spec/vault/caBundle\", \"value\": \"$CA\"}]"
              echo "Creating vault-ca ConfigMap for trust-manager..."
              kubectl create configmap vault-ca --from-literal=ca.crt="$(echo $CA | base64 -d)" -n cert-manager --dry-run=client -o yaml | kubectl apply -f -
      restartPolicy: OnFailure
