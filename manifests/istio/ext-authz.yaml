# Istio AuthorizationPolicy + EnvoyFilter for Authentik ext-authz
# This routes authentication decisions through Authentik's outpost
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: authentik-ext-authz
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  action: CUSTOM
  provider:
    name: authentik-ext-authz
  rules:
  - to:
    - operation:
        # Protect these hosts with Authentik auth
        hosts:
        - "grafana.static.128.41.98.91.clients.your-server.de"
        - "gitea.static.128.41.98.91.clients.your-server.de"
        - "seaweedfs.static.128.41.98.91.clients.your-server.de"
        - "openfga.static.128.41.98.91.clients.your-server.de"
---
# Register Authentik as an ext-authz provider in the mesh config
# Note: This is typically done via meshConfig in istiod Helm values.
# The EnvoyFilter approach below is an alternative.
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: authentik-ext-authz-filter
  namespace: istio-system
spec:
  configPatches:
  - applyTo: CLUSTER
    match:
      context: ANY
    patch:
      operation: ADD
      value:
        name: ext-authz-authentik
        type: STRICT_DNS
        connect_timeout: 5s
        load_assignment:
          cluster_name: ext-authz-authentik
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: authentik.authentik.svc.cluster.local
                    port_value: 9443
