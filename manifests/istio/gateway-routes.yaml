apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: orb-wildcard-cert
  namespace: istio-ingress
spec:
  secretName: orb-wildcard-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "*.static.128.41.98.91.clients.your-server.de"
  dnsNames:
  - "*.static.128.41.98.91.clients.your-server.de"
  - "localhost"
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: orb-gateway
  namespace: istio-ingress
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*.static.128.41.98.91.clients.your-server.de"
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - "*.static.128.41.98.91.clients.your-server.de"
    tls:
      mode: SIMPLE
      credentialName: orb-wildcard-tls # Will be populated by Vault PKI
---
# ── Authentik ──
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: authentik
  namespace: authentik
spec:
  hosts:
  - "auth.static.128.41.98.91.clients.your-server.de"
  gateways:
  - istio-ingress/orb-gateway
  http:
  - route:
    - destination:
        host: authentik-server.authentik.svc.cluster.local
        port:
          number: 80
---
# ── Grafana ──
