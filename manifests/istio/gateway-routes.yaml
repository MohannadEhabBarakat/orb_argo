apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: orb-wildcard-cert
  namespace: istio-ingress
spec:
  secretName: orb-wildcard-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: "*.localhost"
  dnsNames:
  - "*.localhost"
  - "localhost"
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: orb-gateway
  namespace: istio-ingress
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*.localhost"
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - "*.localhost"
    tls:
      mode: SIMPLE
      credentialName: orb-wildcard-tls # Will be populated by Vault PKI
---
# ── Authentik ──
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: authentik
  namespace: authentik
spec:
  hosts:
  - "auth.localhost"
  gateways:
  - istio-ingress/orb-gateway
  http:
  - route:
    - destination:
        host: authentik.authentik.svc.cluster.local
        port:
          number: 80
---
