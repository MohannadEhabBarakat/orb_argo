apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "62"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 5.41.4
    helm:
      values: |
        backend:
          replicas: 1
          persistence:
            storageClass: local-path
          affinity: {}
        read:
          replicas: 1
          affinity: {}
        write:
          replicas: 1
          persistence:
            storageClass: local-path
          affinity: {}
        singleBinary:
          replicas: 0
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
          lokiCanary:
            enabled: false
        test:
          enabled: false
        loki:
          commonConfig:
            replication_factor: 1
          extraArgs:
            - "-config.expand-env=true"
          extraEnv:
            - name: SEAWEEDFS_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-vault-secrets
                  key: SEAWEEDFS_S3_SECRET_KEY
            - name: SEAWEEDFS_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-vault-secrets
                  key: SEAWEEDFS_S3_ACCESS_KEY
          storage:
            type: s3
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin
            s3:
              endpoint: seaweedfs-s3.seaweedfs.svc.cluster.local:8333
              accessKeyId: ${SEAWEEDFS_S3_ACCESS_KEY}
              secretAccessKey: ${SEAWEEDFS_S3_SECRET_KEY}
              s3ForcePathStyle: true
              insecure: true
          auth_enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
