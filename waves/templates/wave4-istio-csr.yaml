apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-istio-csr
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  ignoreDifferences:
  - group: cert-manager.io
    kind: Certificate
    jsonPointers:
    - /spec/duration
    - /spec/renewBefore
  source:
    repoURL: 'https://charts.jetstack.io'
    chart: cert-manager-istio-csr
    targetRevision: v0.16.0
    helm:
      values: |
        app:
          certmanager:
            issuer:
              name: vault-issuer
              kind: ClusterIssuer
              group: cert-manager.io
          istio:
            namespace: istio-system
            revisions: ["default"]
          server:
            maxCertificateDuration: 72h
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
