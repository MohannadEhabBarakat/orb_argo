apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "64"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://dl.gitea.com/charts/'
    chart: gitea
    targetRevision: 10.1.4
    helm:
      values: |
        gitea:
          admin:
            existingSecret: gitea-vault-secrets
          oauth:
            - name: "authentik"
              provider: "openidConnect"
              autoDiscoverUrl: "https://auth.{{ .Values.baseDomain }}/application/o/gitea/.well-known/openid-configuration"
          config:
            actions:
              ENABLED: true
            database:
              DB_TYPE: postgres
              HOST: postgres.database.svc.cluster.local:5432
              NAME: gitea
              USER: gitea
            storage:
              STORAGE_TYPE: minio
              MINIO_ENDPOINT: seaweedfs-s3.seaweedfs.svc.cluster.local:8333
              MINIO_BUCKET: gitea
              MINIO_USE_SSL: false
            openid:
              ENABLE_OPENID_SIGNIN: true
            oauth2_client:
              OPENID_CONNECT_SCOPES: "openid profile email"
              ENABLE_AUTO_REGISTRATION: true
              ACCOUNT_LINKING: auto
            service:
              DISABLE_REGISTRATION: true
              ALLOW_ONLY_EXTERNAL_REGISTRATION: true
              ENABLE_BASIC_AUTHENTICATION: false
              ENABLE_PASSWORD_SIGNIN_FORM: false

        initPreScript: |
          cat /etc/ssl/certs/ca-certificates.crt /custom-ca/root-ca.pem > /tmp/ca-certificates.crt
        
        extraVolumes:
          - name: custom-ca
            configMap:
              name: vault-ca
              items:
                - key: root-ca.pem
                  path: root-ca.pem

        extraInitVolumeMounts:
          - name: custom-ca
            mountPath: /custom-ca
            readOnly: true

        extraContainerVolumeMounts:
          - name: custom-ca
            mountPath: /custom-ca
            readOnly: true

        # Inject Vault secrets as environment variables
        # Inject Vault secrets as environment variables into all containers (including init)
        deployment:
          env:
            - name: SSL_CERT_FILE
              value: /tmp/ca-certificates.crt
            - name: GITEA_OAUTH_KEY_0
              value: "gitea"
            - name: GITEA_OAUTH_SECRET_0
              valueFrom:
                secretKeyRef:
                  name: gitea-vault-secrets
                  key: GITEA_CLIENT_SECRET
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: gitea-vault-secrets
                  key: GITEA_DATABASE_PASSWD
            - name: GITEA__storage__MINIO_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: gitea-vault-secrets
                  key: SEAWEEDFS_S3_ACCESS_KEY
            - name: GITEA__storage__MINIO_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: gitea-vault-secrets
                  key: SEAWEEDFS_S3_SECRET_KEY
        
        postgresql:
          enabled: false
        postgresql-ha:
          enabled: false
        redis:
          enabled: false
        redis-cluster:
          enabled: false
        
        persistence:
          enabled: true
          storageClass: local-path
          size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
