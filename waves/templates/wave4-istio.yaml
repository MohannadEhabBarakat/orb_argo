apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "41"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: base
    targetRevision: 1.30.1
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "42"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: istiod
    targetRevision: 1.30.1
    helm:
      values: |
        # Use cert-manager-istio-csr as the CA for Istio mTLS
        global:
          caAddress: "cert-manager-istio-csr.cert-manager.svc:443"
        pilot:
          env:
            ENABLE_CA_SERVER: "false"
            PILOT_CERT_PROVIDER: "kubernetes"
          # ext-authz provider config for Authentik
        meshConfig:
          accessLogFile: /dev/stdout
          extensionProviders:
            - name: authentik-ext-authz
              envoyExtAuthzHttp:
                service: authentik-server.authentik.svc.cluster.local
                port: 80
                includeRequestHeadersInCheck: ["authorization", "cookie"]
                headersToUpstreamOnAllow: ["authorization"]
                headersToDownstreamOnDeny: ["content-type", "set-cookie"]
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ingressgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "43"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://istio-release.storage.googleapis.com/charts'
    chart: gateway
    targetRevision: 1.30.1
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
